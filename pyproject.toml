[tool.ruff]
line-length = 100
target-version = "py312"
exclude = ["venv", "migrations", "*/migrations/*"]

[tool.ruff.lint]
# E/F = pyflakes+pycodestyle, I = isort, UP = pyupgrade, B = bugbear.
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "core.settings"
python_files = ["test_*.py", "tests.py"]
testpaths = ["api"]
