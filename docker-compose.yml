services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-conflictzone}
      POSTGRES_USER: ${POSTGRES_USER:-conflictzone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-conflictzone}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-conflictzone}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-conflictzone}
      POSTGRES_USER: ${POSTGRES_USER:-conflictzone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-conflictzone}
    volumes:
      - static_data:/app/staticfiles
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_data:/app/staticfiles:ro
    depends_on:
      - web

volumes:
  pg_data:
  static_data:
